<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avançado - Vendas com Inteligência Artificial</title>
<style>
  :root{
    --bg: #ffffff;
    --row-alt: #f2f2f2;
    --line: #e2e2e2;
    --text: #17181a;
    --text-dim: #6b6f76;
    --accent: #5b8def;
    --accent-soft: #eaf1ff;
    --radius: 10px;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* HEADER */
  .eyebrow{
    text-transform: uppercase;
    letter-spacing: .04em;
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 2px;
  }
  h1.title{
    font-size: 22px;
    line-height: 1.3;
    margin: 0 0 18px;
    font-weight: 700;
    color: var(--text);
  }
  h2.aula{
    font-size: 30px;
    margin: 0 0 20px;
    font-weight: 800;
    color: var(--text);
  }

  /* TABS */
  .tabs{
    display:flex;
    align-items:center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }
  .tabs-left{ display:flex; gap: 26px; }
  .tab-btn{
    background:none;
    border:none;
    color: var(--text-dim);
    font-size: 17px;
    font-weight: 600;
    padding: 10px 2px 14px;
    cursor:pointer;
    position: relative;
  }
  .tab-btn.active{ color: var(--text); }
  .tab-btn.active::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height: 3px;
    background: var(--text);
  }
  .star{
    width: 24px; height: 24px;
    color: var(--text-dim);
    flex-shrink:0;
  }

  /* MODULE LIST */
  .modules{ display:flex; flex-direction:column; gap: 12px; margin-top: 18px; }

  .module{
    background: var(--bg);
    border: 1px solid transparent;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .module.selected{
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .module-head{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 18px 16px;
    cursor:pointer;
    gap: 14px;
    background: var(--row-alt);
  }
  .module:nth-child(odd) .module-head{ background: var(--bg); }
  .module.selected .module-head{ background: var(--accent-soft); }

  .module-name{
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .module-meta{
    display:flex;
    align-items:center;
    gap: 14px;
    flex-shrink:0;
  }

  .progress-pill{
    font-size: 15px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    min-width: 30px;
    text-align:right;
  }

  .chevron{
    width: 18px; height: 18px;
    color: var(--text);
    transition: transform .25s ease;
    flex-shrink:0;
  }
  .module.open .chevron{ transform: rotate(180deg); }

  .progress-bar{ display:none; }
  .progress-bar-fill{ display:none; }

  /* VIDEO LIST (accordion body) */
  .video-list{
    max-height:0;
    overflow:hidden;
    transition: max-height .3s ease;
    background: var(--bg);
  }

  .video-item{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 16px 14px 32px;
    border-top: 1px solid var(--line);
    cursor:pointer;
  }
  .video-item:hover{ background: var(--row-alt); }
  .video-item.watched .video-title{ color: var(--text-dim); }

  .video-icon{
    width: 30px; height: 30px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--row-alt);
    border: 1px solid var(--line);
    flex-shrink:0;
  }
  .video-item.watched .video-icon{
    background: var(--accent);
    border-color: var(--accent);
  }
  .video-icon svg{ width:13px; height:13px; }
  .video-icon.watched-icon svg{ fill: none; stroke: #fff; }
  .video-icon:not(.watched-icon) svg{ fill: var(--text-dim); }

  .video-title{
    font-size: 15px;
    color: var(--text);
    flex: 1;
  }

  /* PLAYER VIEW */
  .player-view{
    display:none;
  }
  .player-view.active{ display:block; }
  .modules-view.hidden{ display:none; }

  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:none;
    border:none;
    color: var(--text);
    font-size: 15px;
    font-weight:600;
    cursor:pointer;
    padding: 8px 0;
    margin-bottom: 18px;
  }
  .back-btn svg{ width:16px; height:16px; }
  .back-btn:hover{ text-decoration: underline; }

  .player-frame{
    background: #000;
    border-radius: var(--radius);
    aspect-ratio: 16/9;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border: 1px solid var(--line);
  }
  .player-frame video{
    width:100%; height:100%; object-fit:contain;
  }
  .player-placeholder{
    color: #aaa;
    text-align:center;
    padding: 20px;
    font-size: 14px;
  }
  .player-placeholder svg{ width:48px; height:48px; margin-bottom:10px; opacity:.5; }

  .player-info{
    margin-top: 20px;
  }
  .player-module-tag{
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight:700;
    margin-bottom: 8px;
  }
  .player-title{
    font-size: 21px;
    font-weight: 700;
    margin: 0 0 18px;
    color: var(--text);
  }

  .player-nav{
    display:flex;
    gap: 10px;
    margin-top: 10px;
  }
  .nav-btn{
    flex:1;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight:600;
    cursor:pointer;
    text-align:left;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .nav-btn:hover:not(:disabled){ background: var(--row-alt); border-color: var(--accent); }
  .nav-btn:disabled{ opacity:.35; cursor:default; }
  .nav-btn span.label{ font-size:11px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:.06em; }

  .up-next{
    margin-top: 28px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .up-next h3{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-dim);
    margin: 0 0 12px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  @media (max-width: 480px){
    h2.aula{ font-size: 26px; }
    .video-item{ padding-left: 24px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="eyebrow">Avançado</div>
  <h1 class="title">Vendas com Inteligência Artificial (IA)</h1>
  <h2 class="aula">Aula 03</h2>

  <!-- ===== MODULES VIEW ===== -->
  <div class="modules-view" id="modulesView">
    <div class="tabs">
      <div class="tabs-left">
        <button class="tab-btn active" type="button">Aulas</button>
        <button class="tab-btn" type="button">Conteúdo</button>
      </div>
      <svg class="star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2.5l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.7l-6.1 3.3 1.4-6.8L2.2 9.5l6.9-.7L12 2.5z"/></svg>
    </div>

    <div class="modules" id="modules"></div>
  </div>

  <!-- ===== PLAYER VIEW ===== -->
  <div class="player-view" id="playerView">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Voltar para os módulos
    </button>

    <div class="player-frame" id="playerFrame">
      <div class="player-placeholder" id="playerPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z" fill="currentColor" stroke="none"/></svg>
        <div>Vídeo de exemplo — substitua pelo link do seu vídeo</div>
      </div>
    </div>

    <div class="player-info">
      <div class="player-module-tag" id="playerModuleTag">Módulo</div>
      <h3 class="player-title" id="playerTitle">Título do vídeo</h3>

      <div class="player-nav">
        <button class="nav-btn" id="prevBtn">
          <span class="label">← Anterior</span>
          <span id="prevLabel">—</span>
        </button>
        <button class="nav-btn" id="nextBtn">
          <span class="label">Próximo →</span>
          <span id="nextLabel">—</span>
        </button>
      </div>
    </div>

    <div class="up-next">
      <h3>Outros vídeos deste módulo</h3>
      <div class="video-list" style="max-height:none;" id="upNextList"></div>
    </div>
  </div>

</div>

<script>
// ======= DADOS DO CURSO (edite aqui) =======
// Cada vídeo aponta para "videos/videoaulaN.mp4" (numeração sequencial, do 1º ao último).
// Basta colocar os arquivos com esses mesmos nomes dentro de uma pasta "videos"
// no seu repositório do GitHub, do lado do arquivo HTML.
let videoCounter = 1;
function nextVideo(watched){
  const n = videoCounter++;
  return { title: "Vídeoaula " + n, watched: watched, src: "videos/videoaula" + n + ".mp4" };
}

const course = [
  {
    name: "Módulo 01 - Comece por aqui",
    videos: [
      nextVideo(true),
      nextVideo(true),
      nextVideo(false)
    ]
  },
  {
    name: "Módulo 02 - Mentalidade avançada",
    videos: [
      nextVideo(true),
      nextVideo(true),
      nextVideo(false),
      nextVideo(false),
      nextVideo(false)
    ]
  },
  {
    name: "Módulo 03 - Conhecendo a Kiwify",
    videos: [
      nextVideo(false),
      nextVideo(false),
      nextVideo(false),
      nextVideo(false)
    ]
  },
  {
    name: "Kiwify - Produtos para vender",
    videos: [
      nextVideo(false)
    ]
  },
  {
    name: "Módulo 04 - Oportunidade de ouro",
    videos: [
      nextVideo(false),
      nextVideo(false),
      nextVideo(false)
    ]
  },
  {
    name: "Módulo 05 - Instagram de vendas!",
    videos: [
      nextVideo(false),
      nextVideo(false),
      nextVideo(false),
      nextVideo(false)
    ]
  }
];

const modulesEl = document.getElementById('modules');
const modulesView = document.getElementById('modulesView');
const playerView = document.getElementById('playerView');
const playerFrame = document.getElementById('playerFrame');
const playerModuleTag = document.getElementById('playerModuleTag');
const playerTitle = document.getElementById('playerTitle');
const upNextList = document.getElementById('upNextList');
const backBtn = document.getElementById('backBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const prevLabel = document.getElementById('prevLabel');
const nextLabel = document.getElementById('nextLabel');

let currentModule = 0;
let currentVideo = 0;
let openModuleIndex = null; // qual módulo está expandido na lista

const playIconSVG = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
const checkIconSVG = `<svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;

function watchedCount(mod){
  return mod.videos.filter(v => v.watched).length;
}

function renderModules(){
  modulesEl.innerHTML = '';
  course.forEach((mod, mIdx) => {
    const isOpen = openModuleIndex === mIdx;
    const done = watchedCount(mod);
    const total = mod.videos.length;
    const pct = total ? Math.round((done/total)*100) : 0;

    const moduleDiv = document.createElement('div');
    moduleDiv.className = 'module' + (isOpen ? ' open selected' : '');

    moduleDiv.innerHTML = `
      <div class="module-head">
        <div class="module-name">${mod.name}</div>
        <div class="module-meta">
          <div class="progress-pill">${done}/${total}</div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="video-list" id="vlist-${mIdx}"></div>
    `;

    const head = moduleDiv.querySelector('.module-head');
    head.addEventListener('click', () => {
      openModuleIndex = (openModuleIndex === mIdx) ? null : mIdx;
      renderModules();
    });

    modulesEl.appendChild(moduleDiv);

    const vlist = moduleDiv.querySelector(`#vlist-${mIdx}`);
    mod.videos.forEach((vid, vIdx) => {
      const item = document.createElement('div');
      item.className = 'video-item' + (vid.watched ? ' watched' : '');
      item.innerHTML = `
        <div class="video-icon ${vid.watched ? 'watched-icon' : ''}">${vid.watched ? checkIconSVG : playIconSVG}</div>
        <div class="video-title">${vid.title}</div>
      `;
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        openPlayer(mIdx, vIdx);
      });
      vlist.appendChild(item);
    });

    if(isOpen){
      // set max-height for smooth animation based on content
      requestAnimationFrame(() => {
        vlist.style.maxHeight = vlist.scrollHeight + 'px';
      });
    } else {
      vlist.style.maxHeight = '0px';
    }
  });
}

function openPlayer(mIdx, vIdx){
  currentModule = mIdx;
  currentVideo = vIdx;
  const mod = course[mIdx];
  mod.videos[vIdx].watched = true;

  modulesView.classList.add('hidden');
  playerView.classList.add('active');

  renderPlayer();
}

function renderPlayer(){
  const mod = course[currentModule];
  const vid = mod.videos[currentVideo];

  playerModuleTag.textContent = mod.name;
  playerTitle.textContent = vid.title;

  if(vid.src){
    playerFrame.innerHTML = `<video src="${vid.src}" controls autoplay></video>`;
  } else {
    playerFrame.innerHTML = `
      <div class="player-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z" fill="currentColor" stroke="none"/></svg>
        <div>Vídeo de exemplo — substitua "src" pelo link real no código</div>
      </div>`;
  }

  // navegação anterior/próximo dentro do módulo (ou módulo seguinte/anterior)
  const hasPrev = currentVideo > 0 || currentModule > 0;
  const hasNext = currentVideo < mod.videos.length - 1 || currentModule < course.length - 1;

  prevBtn.disabled = !hasPrev;
  nextBtn.disabled = !hasNext;

  if(currentVideo > 0){
    prevLabel.textContent = mod.videos[currentVideo - 1].title;
  } else if(currentModule > 0){
    const pm = course[currentModule - 1];
    prevLabel.textContent = pm.videos[pm.videos.length - 1].title;
  } else {
    prevLabel.textContent = '—';
  }

  if(currentVideo < mod.videos.length - 1){
    nextLabel.textContent = mod.videos[currentVideo + 1].title;
  } else if(currentModule < course.length - 1){
    nextLabel.textContent = course[currentModule + 1].videos[0].title;
  } else {
    nextLabel.textContent = '—';
  }

  // lista "outros vídeos deste módulo"
  upNextList.innerHTML = '';
  mod.videos.forEach((v, i) => {
    if(i === currentVideo) return;
    const item = document.createElement('div');
    item.className = 'video-item' + (v.watched ? ' watched' : '');
    item.style.paddingLeft = '18px';
    item.innerHTML = `
      <div class="video-icon ${v.watched ? 'watched-icon' : ''}">${v.watched ? checkIconSVG : playIconSVG}</div>
      <div class="video-title">${v.title}</div>
    `;
    item.addEventListener('click', () => openPlayer(currentModule, i));
    upNextList.appendChild(item);
  });
}

prevBtn.addEventListener('click', () => {
  if(currentVideo > 0){
    openPlayer(currentModule, currentVideo - 1);
  } else if(currentModule > 0){
    const pm = course[currentModule - 1];
    openPlayer(currentModule - 1, pm.videos.length - 1);
  }
});

nextBtn.addEventListener('click', () => {
  const mod = course[currentModule];
  if(currentVideo < mod.videos.length - 1){
    openPlayer(currentModule, currentVideo + 1);
  } else if(currentModule < course.length - 1){
    openPlayer(currentModule + 1, 0);
  }
});

backBtn.addEventListener('click', () => {
  playerView.classList.remove('active');
  modulesView.classList.remove('hidden');
  openModuleIndex = currentModule; // mantém o módulo do vídeo aberto
  renderModules();
});

renderModules();
</script>

</body>
</html>
